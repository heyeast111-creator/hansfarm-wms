<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HANSFARM WMS & ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #e2e8f0; }
        .rack-cell { transition: all 0.15s; position: relative; }
        .cell-empty { background-color: #ffffff; border: 1px dashed #cbd5e1; color: #94a3b8; }
        .cell-full { background-color: #4ade80; border: 1px solid #166534; color: #064e3b; font-weight: bold; }
        .cell-active { background-color: #3b82f6; border: 2px solid #1e3a8a; color: #ffffff; font-weight: bold; transform: scale(1.05); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); z-index: 10; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #cbd5e1; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
        @keyframes pulse-red { 0% { opacity: 1; border-color: red; } 50% { opacity: 0.5; background-color: #fecdd3; border-color: red; } 100% { opacity: 1; border-color: red; } }
        .highlight-pulse { animation: pulse-red 1.5s infinite; border: 3px solid red !important; z-index: 20; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .highlight-move { border: 3px dashed #3b82f6 !important; animation: pulse-blue 1.5s infinite; opacity: 0.8; z-index: 50; }
        .donut-ring { transition: background 1s ease-out; }
    </style>
</head>
<body class="font-sans text-slate-800 flex h-screen bg-slate-100 overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-slate-800 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center w-80">
            <img src="/logo.jpg" onerror="this.src='logo.jpg'" alt="Logo" class="w-32 mb-6 rounded-lg shadow-sm cursor-pointer" onclick="adminLogin()">
            <h2 class="text-xl font-black text-slate-800 mb-4">HANSFARM 접속</h2>
            <input type="password" id="site-pw" placeholder="비밀번호 입력" class="w-full border-2 border-slate-300 rounded-lg p-3 text-center font-black mb-4 outline-none focus:border-indigo-500" onkeypress="if(event.key==='Enter') siteLogin()">
            <button onclick="siteLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded-lg shadow-md">접속하기</button>
        </div>
    </div>

    <aside id="sidebar" class="hidden md:flex w-36 bg-white border-r border-slate-300 flex-col items-center py-6 shadow-lg z-20 shrink-0 h-screen overflow-y-auto">
        <div class="mb-8 w-full px-4 flex justify-center cursor-pointer hover:opacity-80 transition-opacity" onclick="adminLogin()"><img src="/logo.jpg" onerror="this.src='logo.jpg'" alt="HANS FARM" class="max-w-full h-auto object-contain"></div>
        <div class="flex flex-col space-y-2 w-full px-3" id="sidebar-menu">
            <button onclick="showView('dashboard')" class="nav-btn-pc target-dashboard w-full py-3 rounded-md text-sm border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-all">대시보드</button>
            <button onclick="showView('order')" class="nav-btn-pc target-order w-full py-3 rounded-md text-sm border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-all">재고/발주</button>
            <button onclick="showView('production')" class="nav-btn-pc target-production w-full py-3 rounded-md text-sm border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-all">생산관리</button>
            <button onclick="showView('outbound')" class="nav-btn-pc target-outbound w-full py-3 rounded-md text-sm border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-all">출고관리</button>
            <button onclick="showView('products')" class="nav-btn-pc target-products w-full py-3 rounded-md text-sm border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-all">품목관리</button>
            <button onclick="showView('accounting')" class="nav-btn-pc target-accounting hidden w-full py-3 rounded-md text-sm border-slate-200 text-yellow-700 font-black hover:bg-yellow-50 transition-all">정산/회계</button>
            <div class="my-2 border-b border-slate-200 w-full"></div>
            <button onclick="exportPhysicalCountExcel()" class="w-full py-3 rounded-md bg-blue-50 border border-blue-200 text-blue-700 font-black text-[12px] transition-all hover:bg-blue-100">실사 양식</button>
            <button onclick="document.getElementById('excel-upload').click()" class="w-full mt-1 py-3 rounded-md bg-emerald-50 border border-emerald-200 text-emerald-700 font-black text-[12px] transition-all hover:bg-emerald-100">재고 실사</button>
        </div>
    </aside>

    <main id="main-app" class="hidden flex-1 overflow-hidden flex flex-col h-full w-full relative">
        <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" class="hidden" onchange="importExcel(event)">
        
        <div id="view-order" class="hidden flex-col h-full w-full absolute inset-0 bg-slate-100 overflow-hidden">
            <div class="bg-white border-b border-slate-300 px-4 md:px-8 pt-4 flex space-x-2 md:space-x-6 overflow-x-auto shrink-0 shadow-sm">
                <button id="order-tab-inventory" onclick="switchOrderTab('inventory')" class="whitespace-nowrap px-4 md:px-6 py-3 font-black text-indigo-700 border-b-4 border-indigo-700 transition-colors">렉맵</button>
                <button id="order-tab-search" onclick="switchOrderTab('search')" class="whitespace-nowrap px-4 md:px-6 py-3 font-black text-slate-400 hover:text-slate-600 border-b-4 border-transparent transition-colors">재고조회</button>
                <button id="order-tab-history" onclick="switchOrderTab('history')" class="whitespace-nowrap px-4 md:px-6 py-3 font-black text-slate-400 hover:text-slate-600 border-b-4 border-transparent transition-colors">발주조회</button>
                <button id="order-tab-daily" onclick="switchOrderTab('daily')" class="whitespace-nowrap px-4 md:px-6 py-3 font-black text-slate-400 hover:text-slate-600 border-b-4 border-transparent transition-colors">📅 일자별 재고</button>
                <button id="order-tab-safety" onclick="switchOrderTab('safety')" class="whitespace-nowrap px-4 md:px-6 py-3 font-black text-slate-400 hover:text-slate-600 border-b-4 border-transparent transition-colors">안전재고설정</button>
            </div>

            <div class="flex-1 relative overflow-hidden">
                <div id="subview-inventory" class="flex flex-col h-full w-full absolute inset-0 bg-slate-200">
                    <header class="bg-white border-b border-slate-300 flex flex-col xl:flex-row items-start xl:items-center justify-between p-4 shrink-0 shadow-sm z-10 gap-4">
                        <div class="flex space-x-2 overflow-x-auto w-full xl:w-auto">
                            <button id="tab-room" onclick="switchZone('실온')" class="whitespace-nowrap px-4 py-2 bg-orange-500 text-white font-bold rounded-lg text-sm">실온 (Room)</button>
                            <button id="tab-cold" onclick="switchZone('냉장')" class="whitespace-nowrap px-4 py-2 bg-slate-100 border text-slate-500 font-bold rounded-lg text-sm">냉장 (Cold)</button>
                            <button id="tab-floor" onclick="switchZone('현장')" class="whitespace-nowrap px-4 py-2 bg-slate-100 border text-slate-500 font-bold rounded-lg text-sm">생산 현장</button>
                        </div>
                        <div class="flex flex-wrap items-center gap-2">
                            <button onclick="toggleRightPanel()" class="px-3 py-1.5 bg-slate-100 border border-slate-300 text-slate-700 font-black rounded text-xs shadow-sm whitespace-nowrap">우측 패널 켬/끔</button>
                            <button onclick="toggleWaitContainer()" class="px-3 py-1.5 bg-emerald-50 border border-emerald-200 text-emerald-700 font-black rounded text-xs shadow-sm whitespace-nowrap">대기장</button>
                            <button onclick="toggleMapSearch()" class="px-3 py-1.5 bg-indigo-50 border border-indigo-200 text-indigo-700 font-black rounded text-xs shadow-sm whitespace-nowrap">스캔창</button>
                            <select id="floor-select" onchange="renderMap()" class="bg-white border-2 border-slate-300 text-slate-800 font-bold text-xs rounded px-2 py-1.5"><option value="1">1층 (1F)</option><option value="2">2층 (2F)</option></select>
                            <button onclick="load()" class="p-1.5 bg-white border border-slate-300 rounded hover:bg-slate-100"><svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
                        </div>
                    </header>
                    <div class="flex-1 overflow-hidden p-2 md:p-6 relative flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
                        <div id="wait-container" class="hidden w-full md:w-80 flex-col bg-white rounded-xl shadow-md border border-slate-200 shrink-0 h-[40vh] md:h-full overflow-hidden">
                            <div class="p-2 bg-emerald-50 border-b border-emerald-100 flex justify-between items-center"><span class="text-sm font-black text-emerald-800 ml-1">입고 대기장</span><button onclick="createWaitingPallets()" class="bg-emerald-600 text-white font-bold py-1 px-3 rounded text-xs">박스 생성</button></div>
                            <div class="p-3 border-b border-slate-200 space-y-2">
                                <div class="flex space-x-2"><select id="wait-supplier" class="w-1/2 p-1.5 border border-slate-300 rounded bg-slate-50 text-[10px] font-bold outline-none" onchange="updateWaitCategoryDropdown()"></select><select id="wait-cat" class="w-1/2 p-1.5 border border-slate-300 rounded bg-slate-50 text-[10px] font-bold outline-none" onchange="updateWaitItemDropdown()"></select></div>
                                <div class="flex space-x-2"><select id="wait-item" class="w-1/2 p-1.5 border border-slate-300 rounded bg-slate-50 text-[10px] font-bold outline-none" onchange="toggleWaitManualInput()"></select><input type="text" id="wait-item-manual" placeholder="품목 직접 입력" class="hidden w-1/2 p-1.5 border-2 border-orange-300 rounded bg-orange-50 text-[10px] font-black text-orange-700 outline-none"><input type="date" id="wait-date" class="w-1/2 p-1.5 border border-slate-300 rounded bg-slate-50 text-[10px] font-bold outline-none"></div>
                                <div class="flex space-x-2"><input type="number" id="wait-qty" placeholder="EA수량" class="w-1/2 p-1.5 border-2 border-emerald-300 rounded font-black text-emerald-700 text-[11px] outline-none"><input type="number" id="wait-pal" placeholder="P수량" class="w-1/2 p-1.5 border-2 border-emerald-300 rounded font-black text-emerald-700 text-[11px] outline-none"></div>
                            </div>
                            <div class="flex-1 overflow-y-auto p-3 bg-slate-100 grid grid-cols-2 md:grid-cols-3 gap-2 content-start custom-scrollbar" id="waiting-grid"></div>
                        </div>
                        <div class="flex-1 flex flex-col rounded-xl overflow-hidden relative">
                            <div id="map-scroller" class="w-full h-full overflow-auto custom-scrollbar p-2 md:p-6 bg-white shadow-inner">
                                <div class="transition-all mx-auto w-fit min-w-max" id="map-container">
                                    <div id="vertical-racks" class="flex items-end flex-nowrap"></div>
                                    <div class="h-10 md:h-14 w-full flex items-center justify-center text-slate-400 font-black tracking-[0.5em] bg-yellow-50/50 border-y-2 border-yellow-300 my-4 shadow-inner text-xs md:text-sm">통로 (Aisle)</div>
                                    <div class="flex justify-end md:pr-[168px] flex-nowrap" id="horizontal-rack"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="subview-history" class="hidden flex-col h-full w-full absolute inset-0 p-4 md:p-8 bg-slate-100 overflow-hidden">
                    <div class="flex justify-between items-center mb-4 shrink-0"><h2 class="text-xl font-black">발주 내역 관리</h2><button onclick="toggleOrderCart()" class="bg-indigo-600 text-white font-bold py-2 px-4 rounded-lg">신규 발주 작성</button></div>
                    <div id="order-cart-container" class="hidden flex-col mb-4 bg-white p-4 rounded-xl border-2 border-indigo-200 shadow-md shrink-0">
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-4">
                            <select id="oc-sup" onchange="updateOrderCartCategoryDropdown()" class="p-2 border rounded font-bold text-xs bg-slate-50"></select>
                            <select id="oc-cat" onchange="updateOrderCartItemDropdown()" class="p-2 border rounded font-bold text-xs bg-slate-50"></select>
                            <select id="oc-item" class="p-2 border rounded font-bold text-xs bg-slate-50"></select>
                            <input type="date" id="oc-date" class="p-2 border rounded font-bold text-xs">
                            <div class="flex space-x-1"><input type="number" id="oc-pal" placeholder="P" class="w-1/2 border-2 border-indigo-300 rounded p-1 font-black text-indigo-700 outline-none"><button onclick="addOrderCartItem()" class="flex-1 bg-indigo-600 text-white font-bold rounded text-xs shadow-sm">담기</button></div>
                        </div>
                        <div class="max-h-32 overflow-auto border rounded mb-2 bg-slate-50"><table class="w-full text-[11px]"><tbody id="order-cart-tbody"></tbody></table></div>
                        <button onclick="submitOrderCart()" class="w-full py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white font-black rounded-lg transition-colors shadow-md">발주 확정 및 카카오톡 텍스트 복사</button>
                    </div>
                    <div class="bg-white rounded-xl border shadow-sm flex-1 overflow-hidden flex flex-col min-h-[300px]">
                        <div id="order-sort-area" class="shrink-0 bg-slate-50 p-2 border-b"></div>
                        <div class="overflow-auto flex-1 custom-scrollbar">
                            <table class="w-full text-left border-collapse min-w-[800px]">
                                <thead class="sticky top-0 bg-slate-50 border-b-2 text-slate-500 text-xs font-black z-10 shadow-sm"><tr><th class="p-3">발주일</th><th class="p-3 text-blue-600">예정일</th><th class="p-3">발주처</th><th class="p-3">품목명</th><th class="p-3 text-right">수량</th><th class="p-3 text-center">상태</th><th class="p-3 text-center">작업</th></tr></thead>
                                <tbody id="order-list-tbody" class="divide-y text-xs"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="subview-search" class="hidden absolute inset-0"></div>
                <div id="subview-daily" class="hidden absolute inset-0"></div>
                <div id="subview-safety" class="hidden absolute inset-0"></div>
            </div>
        </div>

        <div id="view-dashboard" class="hidden absolute inset-0 p-8 overflow-auto bg-slate-100 z-10">
            <h1 class="text-3xl font-black text-slate-800 mb-8">물류 대시보드</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-orange-500 flex flex-col items-center">
                    <h3 class="font-black text-orange-800 mb-4">☀️ 실온 창고</h3>
                    <div id="dash-room-donut" class="relative w-32 h-32 rounded-full flex items-center justify-center shadow-inner mb-6 donut-ring"><div class="absolute inset-3 bg-white rounded-full flex items-center justify-center"><span class="text-2xl font-black text-orange-600" id="dash-room-percent">0%</span></div></div>
                    <div class="w-full text-xs font-bold text-slate-600 space-y-2"><div class="flex justify-between"><span>수용량</span><span>170</span></div><div class="flex justify-between text-orange-600"><span>적재</span><span id="dash-room-occ">0</span></div><div class="flex justify-between text-emerald-600"><span>빈 렉</span><span id="dash-room-empty">0</span></div></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-indigo-500 flex flex-col items-center">
                    <h3 class="font-black text-indigo-800 mb-4">❄️ 냉장 창고</h3>
                    <div id="dash-cold-donut" class="relative w-32 h-32 rounded-full flex items-center justify-center shadow-inner mb-6 donut-ring"><div class="absolute inset-3 bg-white rounded-full flex items-center justify-center"><span class="text-2xl font-black text-indigo-600" id="dash-cold-percent">0%</span></div></div>
                    <div class="w-full text-xs font-bold text-slate-600 space-y-2"><div class="flex justify-between"><span>수용량</span><span>116</span></div><div class="flex justify-between text-indigo-600"><span>적재</span><span id="dash-cold-occ">0</span></div><div class="flex justify-between text-emerald-600"><span>빈 렉</span><span id="dash-cold-empty">0</span></div></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-emerald-500 flex flex-col items-center">
                    <h3 class="font-black text-emerald-800 mb-4">🏭 생산 현장</h3>
                    <div id="dash-floor-donut" class="relative w-32 h-32 rounded-full flex items-center justify-center shadow-inner mb-6 donut-ring"><div class="absolute inset-3 bg-white rounded-full flex items-center justify-center"><span class="text-2xl font-black text-emerald-600" id="dash-floor-percent">0%</span></div></div>
                    <div class="w-full text-xs font-bold text-slate-600 space-y-2"><div class="flex justify-between"><span>수용량</span><span>60</span></div><div class="flex justify-between text-emerald-600"><span>적재</span><span id="dash-floor-occ">0</span></div><div class="flex justify-between text-blue-600"><span>빈 렉</span><span id="dash-floor-empty">0</span></div></div>
                </div>
            </div>
            <div id="admin-finance-panel" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-yellow-50 p-6 rounded-2xl border border-yellow-200 shadow-md"><h3 class="text-yellow-800 font-black mb-4">💰 재고 자산 (추정)</h3><div class="flex justify-between text-xl font-black text-yellow-900"><span>총 자산 가치</span><span id="dash-val-total">0 원</span></div></div>
            </div>
        </div>
        
        <div id="view-products" class="hidden absolute inset-0 bg-slate-100"></div>
        <div id="view-production" class="hidden absolute inset-0 bg-slate-100"></div>
        <div id="view-outbound" class="hidden absolute inset-0 bg-slate-100"></div>
        <div id="view-accounting" class="hidden absolute inset-0 bg-slate-100"></div>
    </main>

    <aside id="right-sidebar" class="hidden fixed md:relative bottom-16 md:bottom-0 right-0 w-full md:w-80 h-[60vh] md:h-full bg-white border-t md:border-l border-slate-300 flex flex-col shadow-lg z-40 shrink-0">
        <div class="p-4 border-b bg-slate-50 flex justify-between items-center"><h2 class="text-lg font-black text-slate-800">상세 정보</h2><button onclick="closeInfoPanel()" class="md:hidden text-slate-500 font-bold px-2 py-1 bg-slate-200 rounded text-xs">닫기</button></div>
        <div class="p-4 flex-1 overflow-y-auto custom-scrollbar" id="info-panel"></div>
    </aside>

    <div id="admin-pw-modal" class="hidden fixed inset-0 bg-slate-800 bg-opacity-50 items-center justify-center z-[200]">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-80 flex flex-col"><h2 class="text-lg font-black mb-4 text-center">관리자 비밀번호</h2><input type="password" id="admin-pw-input" class="w-full border-2 rounded-lg p-3 text-center mb-4 outline-none focus:border-indigo-500" onkeypress="if(event.key==='Enter') submitAdminPassword()"><div class="flex space-x-3"><button onclick="closeAdminModal()" class="flex-1 bg-slate-200 font-bold py-2.5 rounded-lg">취소</button><button onclick="submitAdminPassword()" class="flex-1 bg-indigo-600 text-white font-bold py-2.5 rounded-lg shadow-md">확인</button></div></div>
    </div>
    
    <div id="history-modal" class="hidden fixed inset-0 bg-slate-800 bg-opacity-50 items-center justify-center z-[200]"><div class="bg-white p-6 rounded-2xl shadow-2xl w-[90%] max-w-md max-h-[80vh] flex flex-col"><div class="flex justify-between items-center border-b pb-2 mb-4"><h2 class="text-lg font-black text-indigo-800" id="history-modal-title">전체 기록</h2><button onclick="closeHistoryModal()" class="text-slate-500 font-bold text-2xl">&times;</button></div><div id="history-modal-content" class="overflow-y-auto space-y-2 custom-scrollbar"></div></div></div>

    <script src="js_global.js"></script>
    <script src="js_inventory.js"></script>
    <script src="js_products.js"></script>
    <script src="js_accounting.js"></script>
    <script src="js_production.js"></script>
    <script src="js_outbound.js"></script> 
</body>
</html>
